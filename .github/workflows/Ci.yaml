name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12

          - name: Ubuntu Clang
            os: ubuntu-22.04
            cc: clang-14
            cxx: clang++-14

          - name: Windows MSVC
            os: windows-latest
            cc: ""
            cxx: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ${{ matrix.cxx }}

      - name: Configure
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DZEPHYR_BUILD_TESTS=ON
          else
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=${{ matrix.cc }} \
              -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
              -DZEPHYR_BUILD_TESTS=ON
          fi

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
        
